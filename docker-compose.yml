version: "3.9"

services:

  # ── Flask API ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://govca:${DB_PASSWORD}@postgres:5432/govca
      - REDIS_URL=redis://redis:6379/0
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MTLS_CA_CERT=/app/certs/ca/ca.crt
      - MTLS_SERVER_CERT=/app/certs/server/server.crt
      - MTLS_SERVER_KEY=/app/certs/server/server.key
      - VERIFY_CLIENT_CERT=true
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [govca_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/dashboard/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx mTLS reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [app]
    networks: [govca_net]

  # ── Celery worker (email tasks) ────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: celery -A app.services.email_service.celery_app worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://govca:${DB_PASSWORD}@postgres:5432/govca
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on: [redis, postgres]
    networks: [govca_net]

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     govca
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       govca
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [govca_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govca"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [govca_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./ci/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [govca_net]

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-govca2024}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ci/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/govca.json:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [govca_net]

volumes:
  pg_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:

networks:
  govca_net:
    driver: bridge
