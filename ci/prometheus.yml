global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: govca_app
    static_configs:
      - targets: ["app:5000"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]
