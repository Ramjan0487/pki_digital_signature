name: GovCA CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}/govca-app

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy types-Flask

      - name: Run ruff
        run: ruff check app/ tests/ wsgi.py

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ── 2. Unit & integration tests ──────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_USER:     govca
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB:       govca_test
        options: >-
          --health-cmd "pg_isready -U govca"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          FLASK_ENV:    testing
          SECRET_KEY:   test-secret-key-ci
          DATABASE_URL: postgresql://govca:testpass@localhost:5432/govca_test
          REDIS_URL:    redis://localhost:6379/0
          MAIL_SERVER:  localhost
          MAIL_PORT:    "1025"
          MAIL_USERNAME: test@govca.rw
          MAIL_PASSWORD: testpass
          VERIFY_CLIENT_CERT: "false"
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

      - name: Publish test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  # ── 3. Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit safety
      - name: Bandit SAST
        run: bandit -r app/ -ll -ii
        continue-on-error: true
      - name: Safety dependency check
        run: safety check -r requirements.txt
        continue-on-error: true

  # ── 4. Build & push Docker image ─────────────────────────────────────────────
  docker-build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 5. Integration smoke test ─────────────────────────────────────────────────
  smoke-test:
    name: Smoke test (docker compose)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Generate test certs
        run: bash scripts/gen_certs.sh certs

      - name: Start stack
        env:
          SECRET_KEY:        ci-test-secret
          DB_PASSWORD:       testpass
          MAIL_SERVER:       localhost
          MAIL_PORT:         "1025"
          MAIL_USERNAME:     test@govca.rw
          MAIL_PASSWORD:     testpass
          GRAFANA_PASSWORD:  admin
        run: |
          docker compose up -d --wait --timeout 60

      - name: Health check
        run: |
          sleep 10
          curl --fail -k https://localhost/dashboard/api/health

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── 6. Deploy (main only) ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/govca
            docker compose pull app
            docker compose up -d --no-deps app worker
            docker image prune -f
            echo "Deployed $(date)"
