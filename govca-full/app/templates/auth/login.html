<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GovCA — Secure Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-header">
    <div class="govca-logo">
      <div class="logo-shield">🔐</div>
      <span>GovCA Portal</span>
    </div>
    <p class="auth-subtitle">Rwanda National Digital Certification Center</p>
    <div class="mtls-badge" id="mtlsBadge">
      <span class="badge-dot"></span>
      <span id="mtlsLabel">Checking mTLS…</span>
    </div>
  </div>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="national_id">National ID (16 digits)</label>
      <input type="text" id="national_id" name="national_id"
             maxlength="16" pattern="\d{16}" autocomplete="username"
             placeholder="1199780000000000" required>
      <span class="field-hint" id="nidHint"></span>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" name="password"
               autocomplete="current-password" minlength="8" required>
        <button type="button" class="pw-toggle" id="pwToggle">Show</button>
      </div>
    </div>

    <div class="field-row">
      <label class="checkbox-label">
        <input type="checkbox" id="remember"> Keep me signed in
      </label>
      <a href="/auth/forgot" class="link-small">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
      <span id="btnText">Sign In Securely</span>
      <span id="btnSpinner" class="spinner hidden"></span>
    </button>
  </form>

  <div class="cert-info" id="certInfo"></div>

  <div class="auth-footer">
    <a href="https://www.govca.rw" target="_blank">govca.rw</a> ·
    <a href="https://www.govca.rw/about/contacts.sg" target="_blank">Contact</a> ·
    <a href="https://www.govca.rw/terms/lawsAndRegulations.sg" target="_blank">Legal</a>
  </div>
</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
