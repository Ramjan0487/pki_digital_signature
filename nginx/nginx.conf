# nginx/nginx.conf — mTLS termination + reverse proxy to Flask
# Client certificate is verified here; CN/Serial forwarded to Flask via headers.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/h;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$ssl_client_verify" "$ssl_client_s_dn"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    upstream flask {
        server app:5000;
        keepalive 8;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name govca.rw www.govca.rw localhost;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS + mTLS server ───────────────────────────────────────────────
    server {
        listen              443 ssl;
        server_name         govca.rw www.govca.rw localhost;
        client_max_body_size 10M;

        # Server TLS
        ssl_certificate     /etc/nginx/certs/server/server.crt;
        ssl_certificate_key /etc/nginx/certs/server/server.key;

        # mTLS — require client certificate signed by our CA
        ssl_client_certificate /etc/nginx/certs/ca/ca.crt;
        ssl_verify_client       optional;     # 'on' = mandatory, 'optional' = allowed
        ssl_verify_depth        2;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Forward client cert info to Flask
        proxy_set_header X-SSL-Client-Verify  $ssl_client_verify;
        proxy_set_header X-SSL-Client-DN      $ssl_client_s_dn;
        proxy_set_header X-SSL-Client-Serial  $ssl_client_serial;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto    https;
        proxy_set_header Host                 $host;

        # ── Login endpoint — rate limited ──────────────────────────────
        location /auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://flask;
        }

        # ── Upload endpoint — rate limited ─────────────────────────────
        location /upload/submit {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://flask;
        }

        # ── Prometheus metrics — internal only ────────────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            proxy_pass http://flask/metrics;
        }

        # ── Everything else ────────────────────────────────────────────
        location / {
            proxy_pass         http://flask;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
