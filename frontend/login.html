<html><body>
<form id='f'>
<input name='username'/>
<input type='file' name='passport'/>
<button>Login</button></form>
<p id='r'></p>
<script>
f.onsubmit=async e=>{
e.preventDefault();
let fd=new FormData(f);
let res=await fetch('https://localhost:5000/login',{method:'POST',body:fd});
r.innerText=JSON.stringify(await res.json());
}
</script></body></html>
